name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Sync version from root package.json
        run: pnpm version:sync

      - name: Build Dashboard (Vue UI)
        run: pnpm build:dashboard

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Python backend (PyInstaller onedir)
        run: pyinstaller virtual_tcu.spec --noconfirm

      - name: Build & package Electron shell (NSIS + zip)
        working-directory: apps/electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm package

      - name: Stage backend-only zip (legacy, no Electron)
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $stage = "release-staging"
          New-Item -ItemType Directory -Force -Path "$stage/VirtualTCU" | Out-Null
          Copy-Item -Recurse -Force "dist/VirtualTCU/*" "$stage/VirtualTCU/"
          Copy-Item -Force "packaging/Launch VirtualTCU.bat" "$stage/"
          Compress-Archive -Path "$stage/*" -DestinationPath "VirtualTCU-Backend-$version-win64.zip" -Force

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            apps/electron/release/VirtualTCU-*-win64.exe
            apps/electron/release/VirtualTCU-*-win64.zip
            apps/electron/release/latest.yml
            VirtualTCU-Backend-*-win64.zip
          generate_release_notes: true
