name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web-ui/package-lock.json

      - name: Build Web UI
        working-directory: web-ui
        run: |
          npm ci
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: PyInstaller (onedir)
        run: pyinstaller virtual_tcu.spec --noconfirm

      - name: Create zip archive
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $stage = "release-staging"
          New-Item -ItemType Directory -Force -Path "$stage/VirtualTCU" | Out-Null
          Copy-Item -Recurse -Force "dist/VirtualTCU/*" "$stage/VirtualTCU/"
          Copy-Item -Force "release/Launch VirtualTCU.bat" "$stage/"
          Compress-Archive -Path "$stage/*" -DestinationPath "VirtualTCU-$version-win64.zip" -Force

      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          files: VirtualTCU-*.zip
          generate_release_notes: true
