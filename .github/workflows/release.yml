name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            web-ui/package-lock.json
            electron/package-lock.json

      - name: Build Web UI (Vue dashboard)
        working-directory: web-ui
        run: |
          npm ci
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Python backend (PyInstaller onedir)
        run: pyinstaller virtual_tcu.spec --noconfirm
        # Output: dist/VirtualTCU/VirtualTCU.exe (consumed by electron-builder
        # via extraResources)

      - name: Install Electron shell deps
        working-directory: electron
        run: npm ci

      - name: Build & package Electron shell (NSIS + zip)
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run package
        # electron-builder bundles ../dist/VirtualTCU as resources/backend
        # and emits release/VirtualTCU-<version>-win64.{exe,zip} plus
        # latest.yml for electron-updater.

      - name: Stage backend-only zip (legacy, no Electron)
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $stage = "release-staging"
          New-Item -ItemType Directory -Force -Path "$stage/VirtualTCU" | Out-Null
          Copy-Item -Recurse -Force "dist/VirtualTCU/*" "$stage/VirtualTCU/"
          Copy-Item -Force "packaging/Launch VirtualTCU.bat" "$stage/"
          Compress-Archive -Path "$stage/*" -DestinationPath "VirtualTCU-Backend-$version-win64.zip" -Force

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            electron/release/VirtualTCU-*-win64.exe
            electron/release/VirtualTCU-*-win64.zip
            electron/release/latest.yml
            VirtualTCU-Backend-*-win64.zip
          generate_release_notes: true
