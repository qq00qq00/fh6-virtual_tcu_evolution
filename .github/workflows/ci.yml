name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint (ESLint)
        run: pnpm exec eslint .

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python deps + Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint (Ruff)
        run: ruff check virtual_tcu virtual_tcu.py

      - name: Build Dashboard
        run: pnpm build:dashboard

      - name: Build Electron
        run: pnpm build:electron
